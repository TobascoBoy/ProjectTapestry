<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join my Tapestry</title>

  <meta property="og:title" content="Join my Tapestry" />
  <meta property="og:description" content="Tap to join and start weaving." />
  <meta property="og:image" content="https://jointhetapestry.com/og-icon.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://jointhetapestry.com/og-icon.png" />

  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
      font-family: -apple-system, sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
    p  { font-size: 16px; color: rgba(255,255,255,0.6); margin: 0 0 32px; }
    a  {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div>
    <h1>Join my Tapestry</h1>
    <p>Weave the feeling.</p>
    <a href="#" id="openApp">Open in Tapestry</a>
  </div>

  <script>
    // Extract the invite code from the URL path: /join/ABC123
    var parts = window.location.pathname.split("/").filter(Boolean);
    var code = parts[parts.length - 1] || "";
    var deepLink = "tapestry://join/" + code.toUpperCase();
    var appStore = "https://apps.apple.com/app/id0000000000"; // replace when live

    document.getElementById("openApp").href = deepLink;

    // Try to open the app, fall back to App Store after 2s
    if (code) {
      window.location.href = deepLink;
      setTimeout(function () {
        window.location.href = appStore;
      }, 2000);
    }
  </script>
</body>
</html>
